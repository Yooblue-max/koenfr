<script>
const $ = (id) => document.getElementById(id);
let current = { ko: "", en: "", fr: "" };

/* ===== 한글 조합 유틸 ===== */
const CHO = "ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ";
const JUNG = "ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ";
const JONG = " ㄱㄲㄳㄴㄵㄶㄷㄹㄺㄻㄼㄽㄾㄿㅀㅁㅂㅄㅅㅆㅇㅈㅊㅋㅌㅍㅎ";
function syl(cho, jung, jong) {
  const c = CHO.indexOf(cho), j = JUNG.indexOf(jung), o = jong ? JONG.indexOf(jong) : 0;
  if (c < 0 || j < 0) return "";
  return String.fromCharCode(0xAC00 + (c * 21 + j) * 28 + (o < 0 ? 0 : o));
}

/* ===== 프랑스어 → 한글 발음 (원어민식: r=흐, p/t/c=된소리) ===== */
function frWord(w) {
  w = w.toLowerCase().replace(/[.,!?;:"«»""]/g, "");
  if (!w) return "";
  w = w.replace(/['’‘]/g, "'");
  const DICT = {
    "je":"즈","tu":"뛰","il":"일","elle":"엘","nous":"누","vous":"부","est":"에","et":"에",
    "les":"레","des":"데","le":"르","la":"라","un":"앙","une":"윈","bonjour":"봉주흐",
    "bonsoir":"봉수아흐","merci":"메흐시","oui":"위","non":"농","très":"트헤","beau":"보","belle":"벨",
    "aujourd'hui":"오주흐뒤","aujourdhui":"오주흐뒤","c'est":"세","s'il":"실","sil":"실",
    "est-ce":"에스","qu'il":"낄","j'ai":"줴","n'est":"네","d'accord":"다꼬흐",
    "temps":"떵","fait":"페","beaucoup":"보꾸","café":"꺄페","plaît":"플레","plait":"플레",
    "france":"프헝스","paris":"빠히","bien":"비앙","bon":"봉","au":"오","aux":"오","revoir":"흐부아흐",
    "comment":"꼬멍","allez":"알레","ça":"싸","ca":"싸","va":"바","donnez":"도네","moi":"무아",
    "tasse":"따스","de":"드","du":"뒤","pour":"뿌흐","avec":"아벡","jour":"주흐","jours":"주흐",
    "madame":"마담","monsieur":"므슈","excusez":"엑스뀌제","pardon":"빠흐동","toi":"뚜아",
    "amour":"아무흐","vie":"비","prends":"프헝","prend":"프헝","soin":"수앙","soir":"수아흐","eau":"오","vin":"뱅","pain":"빵","fromage":"프호마주"
  };
  if (DICT[w] !== undefined) return DICT[w];
  const w2 = w.replace(/'/g, "");
  if (DICT[w2] !== undefined) return DICT[w2];
  if (w.includes("'")) {
    return frWord(w.replace(/^c'/, "s").replace(/^qu'/, "k").replace(/^[jldns]'/, m => m[0]).replace(/'/g, ""));
  }
  const VOW = "aeiouyàâéèêëîïôûù";
  const V = { "eau":"ㅗ","au":"ㅗ","ou":"ㅜ","oi":"ㅘ","ai":"ㅔ","ei":"ㅔ","eu":"ㅓ","é":"ㅔ","è":"ㅔ","ê":"ㅔ","e":"ㅡ","a":"ㅏ","o":"ㅗ","i":"ㅣ","y":"ㅣ","u":"ㅟ","à":"ㅏ","â":"ㅏ","î":"ㅣ","ô":"ㅗ","û":"ㅟ" };
  const PAL = { "ㅏ":"ㅑ","ㅗ":"ㅛ","ㅜ":"ㅠ","ㅓ":"ㅕ","ㅡ":"ㅠ" };
  let out = "", i = 0;
  function cons(s, next) {
    if (s.startsWith("ch")) return ["ㅅ", 2, true];
    if (s.startsWith("gn")) return ["ㄴ", 2, true];
    if (s.startsWith("qu")) return ["ㄲ", 2, false];
    if (s.startsWith("ph")) return ["ㅍ", 2, false];
    if (s.startsWith("th")) return ["ㄸ", 2, false];
    const c = s[0];
    const M = { b:"ㅂ",c:"ㄲ",ç:"ㅆ",d:"ㄷ",f:"ㅍ",g:"ㄱ",h:"",j:"ㅈ",k:"ㄲ",l:"ㄹ",m:"ㅁ",n:"ㄴ",p:"ㅃ",r:"ㅎ",s:"ㅅ",t:"ㄸ",v:"ㅂ",w:"ㅇ",x:"ㄲ",z:"ㅈ" };
    let h = M[c] ?? "";
    if (c === "c" && "eiéè".includes(next)) h = "ㅆ";
    if (c === "g" && "eiéè".includes(next)) h = "ㅈ";
    return [h, 1, false];
  }
  function clen(s) {
    for (const k of ["ch","gn","qu","ph","th"]) if (s.startsWith(k)) return 2;
    return 1;
  }
  while (i < w.length) {
    let cho = "ㅇ", pal = false;
    const startCh = w[i];
    if (!VOW.includes(startCh)) {
      const L = clen(w.slice(i));
      const [h, adv, p] = cons(w.slice(i), w[i + L] || "");
      pal = p;
      if (h === "" && adv === 1) { i += 1; continue; }
      cho = h || "ㅇ"; i += adv;
      if (i >= w.length || !VOW.includes(w[i])) {
        if (i >= w.length) {
          if ("stdxzpn".includes(startCh)) continue;        // 어말 묵음
          if (startCh === "r") { out += "흐"; continue; }   // 어말 r → 흐
        }
        out += syl(cho, "ㅡ");
        continue;
      }
    }
    let matched = false;
    for (const k of ["ain","ein","on","om","an","am","en","em","in","im","un","um","yn","ym"]) {
      if (w.startsWith(k, i) && !VOW.includes(w[i + k.length] || "")) {
        let jung = { on:"ㅗ",om:"ㅗ",an:"ㅓ",am:"ㅓ",en:"ㅓ",em:"ㅓ" }[k] || "ㅐ";
        if (pal && (k === "an" || k === "am" || k === "en" || k === "em")) jung = "ㅑ";
        else if (pal && PAL[jung]) jung = PAL[jung];
        out += syl(cho, jung, "ㅇ"); i += k.length; matched = true; break;
      }
    }
    if (matched) continue;
    for (const k of ["eau","au","ou","oi","ai","ei","eu"]) {
      if (w.startsWith(k, i)) {
        let jung = V[k];
        if (pal && PAL[jung]) jung = PAL[jung];
        if (k === "oi") { out += syl(cho === "ㅇ" ? "ㅇ" : cho, "ㅜ") ? "" : ""; }
        out += (k === "oi" && cho !== "ㅇ") ? syl(cho, "ㅜ") + "아" : syl(cho, jung);
        i += k.length; matched = true; break;
      }
    }
    if (matched) continue;
    if (V[w[i]]) {
      if (w[i] === "e" && i === w.length - 1 && out) { i++; continue; }
      let jung = V[w[i]];
      if (pal && PAL[jung]) jung = PAL[jung];
      out += syl(cho, jung); i++;
    } else { i++; }
  }
  return out || w;
}
function frToHangul(text) {
  return text.split(/\s+/).map(frWord).filter(Boolean).join(" ");
}

/* ===== 영어 → 한글 발음 (원어민식: 플랩 t, 연음) ===== */
const EN_DICT = {
  "the":"더","a":"어","an":"언","i":"아이","you":"유","he":"히","she":"쉬","we":"위","they":"데이",
  "it":"잇","is":"이즈","are":"아r","am":"앰","was":"워즈","be":"비","to":"투","of":"어브","in":"인",
  "and":"앤","hello":"헬로우","hi":"하이","thank":"땡크","thanks":"땡스","please":"플리즈",
  "good":"굿","morning":"모어닝","night":"나잇","today":"투데이","weather":"웨더r","nice":"나이스",
  "very":"베리","beautiful":"뷰리풀","coffee":"커피","one":"원","cup":"컵","give":"깁",
  "me":"미","have":"해브","day":"데이","love":"러브","like":"라익","want":"원트","water":"워러",
  "food":"푸드","time":"타임","what":"웟","where":"웨어r","when":"웬","how":"하우","much":"머치",
  "this":"디스","that":"댓","yes":"예스","no":"노우","sorry":"쏘리","excuse":"익스큐즈",
  "friend":"프렌드","happy":"해피","really":"륄리","so":"쏘우","great":"그뤠잇","fine":"파인",
  "my":"마이","your":"유어r","his":"히즈","her":"허r","our":"아워r","better":"베러","little":"리를",
  "got":"갓","get":"겟","going":"고잉","let":"렛","letter":"레러","matter":"매러","pretty":"프리리",
  "see":"씨","meet":"밋","take":"테잌","care":"케어r","bye":"바이","goodbye":"굿바이","later":"레이러","again":"어겐","here":"히어r","there":"데어r"
};
const EN_PHRASE = [
  ["땡크 유", "땡큐"], ["깁 미", "김미"], ["원트 투", "워너"], ["고잉 투", "거너"],
  ["갓 잇", "가릿"], ["렛 잇", "레릿"], ["아웃 어브", "아우러브"], ["미 투", "미투"]
];
function enWord(w) {
  const raw = w.toLowerCase().replace(/[.,!?;:"""'']/g, "");
  if (!raw) return "";
  if (EN_DICT[raw]) return EN_DICT[raw];
  let s = raw, out = "", i = 0;
  const RULES = [
    ["tion","션"],["sion","전"],["ough","어프"],["eigh","에이"],["igh","아이"],
    ["sh","쉬"],["ch","치"],["th","드"],["ph","프"],["wh","우"],["ck","크"],
    ["ee","이"],["ea","이"],["oo","우"],["ou","아우"],["ow","오우"],["ay","에이"],
    ["ai","에이"],["oa","오우"],["oi","오이"],["oy","오이"],["au","오"],["aw","오"],
    ["qu","쿠"],["a","애"],["e","에"],["i","이"],["o","오"],["u","어"],["y","이"],
    ["b","브"],["c","크"],["d","드"],["f","프"],["g","그"],["h","흐"],["j","즈"],
    ["k","크"],["l","르"],["m","므"],["n","느"],["p","프"],["r","r"],["s","스"],
    ["t","트"],["v","브"],["w","우"],["x","크스"],["z","즈"]
  ];
  if (s.length > 2 && s.endsWith("e") && !"aeiou".includes(s[s.length - 2])) s = s.slice(0, -1);
  while (i < s.length) {
    let hit = false;
    for (const [k, v] of RULES) {
      if (s.startsWith(k, i)) { out += v; i += k.length; hit = true; break; }
    }
    if (!hit) i++;
  }
  return out || raw;
}
function enToHangul(text) {
  let r = text.split(/\s+/).map(enWord).filter(Boolean).join(" ");
  for (const [a, b] of EN_PHRASE) r = r.split(a).join(b);
  return r;
}

/* ===== 번역 ===== */
function parseGtx(j) { return (j[0] || []).map(s => s[0]).join(""); }
async function gtxFetch(url) {
  try {
    const r = await fetch(url);
    if (r.ok) return await r.json();
  } catch (e) {}
  try {
    const r = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));
    if (r.ok) return await r.json();
  } catch (e) {}
  return null;
}
async function detectLang(text) {
  if (/[가-힣]/.test(text)) return "ko";
  const j = await gtxFetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=" + encodeURIComponent(text));
  if (j && typeof j[2] === "string") {
    const d = j[2].slice(0, 2);
    if (d === "ko" || d === "en" || d === "fr") return d;
  }
  if (/[àâçéèêëîïôûùœ]/i.test(text)) return "fr";
  const frWords = /\b(le|la|les|je|tu|il|elle|est|et|un|une|des|bonjour|merci|vous|nous|pas|c'est)\b/i;
  return frWords.test(text) ? "fr" : "en";
}
function looksValid(out, text, tl) {
  if (!out || !out.trim()) return false;
  if (tl === "ko") return /[가-힣]/.test(out);
  if (!/[a-zA-Zà-ÿÀ-Ÿ]/.test(out)) return false;
  return out.trim().toLowerCase() !== text.trim().toLowerCase();
}
async function translate(text, sl, tl) {
  const gtxUrl = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=" + sl + "&tl="
    + tl + "&dt=t&q=" + encodeURIComponent(text);
  // 1) 구글 직접
  const j1 = await gtxFetch(gtxUrl);
  if (j1) { const out = parseGtx(j1); if (looksValid(out, text, tl)) return out; }
  // 2) 구글 (다른 프록시 경유)
  try {
    const r = await fetch("https://corsproxy.io/?url=" + encodeURIComponent(gtxUrl));
    if (r.ok) { const out = parseGtx(await r.json()); if (looksValid(out, text, tl)) return out; }
  } catch (e) {}
  // 3) Lingva (구글 번역 미러)
  try {
    const r = await fetch("https://lingva.ml/api/v1/" + sl + "/" + tl + "/" + encodeURIComponent(text));
    if (r.ok) { const j = await r.json(); const out = j?.translation; if (looksValid(out, text, tl)) return out; }
  } catch (e) {}
  // 4) MyMemory (검증 통과 시에만)
  try {
    const r = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text)
      + "&langpair=" + encodeURIComponent(sl + "|" + tl));
    const jj = await r.json();
    const out = jj?.responseData?.translatedText;
    if (looksValid(out, text, tl)) return out;
  } catch (e) {}
  throw new Error("번역 서버에 연결할 수 없어요 — 잠시 후 다시 시도해 주세요");
}

/* ===== 원어민 음성 ===== */
let voices = [];
function loadVoices() { voices = speechSynthesis.getVoices(); }
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;
function voiceCandidates(lang) {
  const want = { ko: "ko-kr", en: "en-us", fr: "fr" }[lang];
  const norm = v => v.lang.replace("_", "-").toLowerCase();
  const pool = voices.filter(v => norm(v).startsWith(want.slice(0, 2)));
  const exact = pool.filter(v => norm(v).startsWith(want));
  const list = [];
  const add = v => { if (v && !list.includes(v)) list.push(v); };
  add(exact.find(v => /natural/i.test(v.name)));
  add(exact.find(v => !/natural/i.test(v.name)));
  add(pool.find(v => /natural|online/i.test(v.name)));
  add(pool.find(v => /google/i.test(v.name)));
  add(pool[0]);
  list.push(null); // 마지막: 브라우저 기본 음성
  return list;
}

function speak(lang, btn) {
  const text = current[lang];
  if (!text) return;
  speechSynthesis.cancel();
  const bb = document.getElementById("bubble");
  if (bb) bb.textContent = { ko: "한국어 발음이에요 🇰🇷", en: "영어 발음이에요 🇺🇸", fr: "프랑스어 발음이에요 🇫🇷" }[lang];
  const blk = btn ? btn.closest(".block") : null;
  const uiOn = () => { if (btn) { btn.classList.add("playing"); if (blk) blk.classList.add("playing"); } };
  const uiOff = () => { if (btn) { btn.classList.remove("playing"); if (blk) blk.classList.remove("playing"); } };
  const cands = voiceCandidates(lang);

  function attemptAudio() {
    // 최후 수단: 구글 번역 음성(mp3)
    const a = new Audio("https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl="
      + { ko: "ko", en: "en", fr: "fr" }[lang] + "&q=" + encodeURIComponent(text));
    a.onplay = uiOn;
    a.onended = a.onerror = () => {
      uiOff();
      if (!a.duration) $("status").textContent = "이 기기에서 음성을 재생하지 못했어요";
    };
    a.play().catch(() => { uiOff(); $("status").textContent = "이 기기에서 음성을 재생하지 못했어요"; });
  }

  function attempt(idx) {
    if (idx >= cands.length) { attemptAudio(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = { ko: "ko-KR", en: "en-US", fr: "fr-FR" }[lang];
    if (cands[idx]) u.voice = cands[idx];
    u.rate = 0.92;
    let started = false;
    const watchdog = setTimeout(() => {
      if (!started) { speechSynthesis.cancel(); setTimeout(() => attempt(idx + 1), 120); }
    }, 4000);
    u.onstart = () => { started = true; clearTimeout(watchdog); uiOn(); };
    u.onend = () => { clearTimeout(watchdog); uiOff(); };
    u.onerror = () => {
      clearTimeout(watchdog); uiOff();
      if (!started) setTimeout(() => attempt(idx + 1), 120);
    };
    speechSynthesis.speak(u);
  }
  setTimeout(() => attempt(0), 100);
}

/* ===== 메인 ===== */
function showResult(res) {
  current = res;
  $("ko").textContent = res.ko;
  $("en").textContent = res.en;
  $("fr").textContent = res.fr;
  $("enPron").textContent = enToHangul(res.en);
  $("frPron").textContent = frToHangul(res.fr);
  $("result").style.display = "block";
  $("status").textContent = "";
}

async function run() {
  const text = $("input").value.trim();
  if (!text) return;
  $("go").disabled = true;
  $("status").textContent = "번역 중...";
  try {
    const src = await detectLang(text);
    const targets = ["ko", "en", "fr"].filter(l => l !== src);
    const [t1, t2] = await Promise.all(targets.map(l => translate(text, src, l)));
    const res = {};
    res[src] = text; res[targets[0]] = t1; res[targets[1]] = t2;
    showResult(res);
    speak(src === "en" ? "fr" : "en");
  } catch (e) {
    $("status").textContent = "오류: " + (e.message || e);
  } finally {
    $("go").disabled = false;
  }
}

$("go").addEventListener("click", run);
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); run(); }
});
document.querySelectorAll(".speak").forEach(b =>
  b.addEventListener("click", () => speak(b.dataset.lang, b))
);
document.querySelectorAll(".examples button").forEach(b =>
  b.addEventListener("click", () => { $("input").value = b.textContent; run(); })
);

/* URL 공유 (X용): ?ko=..&en=..&fr=.. 이면 그대로 표시, ?q=문장 이면 자동 번역 */
const urlP = new URLSearchParams(location.search);
if (urlP.get("ko") && urlP.get("en") && urlP.get("fr")) {
  $("input").value = urlP.get("ko");
  showResult({ ko: urlP.get("ko"), en: urlP.get("en"), fr: urlP.get("fr") });
} else if (urlP.get("q")) {
  $("input").value = urlP.get("q");
  run();
}
